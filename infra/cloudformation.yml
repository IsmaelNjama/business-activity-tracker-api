AWSTemplateFormatVersion: '2010-09-09'
Description: 'BAT Lambda Function (FastAPI + Mangum + Docker) with API Gateway and RDS via Secrets Manager'

Parameters:
  FunctionName:
    Type: String
    Default: business-activity-tracker

  ImageUri:
    Type: String
    Description: ECR image URI for the Lambda function

  # ---DB connection info ---
  DBHost:
    Type: String
    Default: database-business-activity-instance.cefqgw0yc3c2.us-east-1.rds.amazonaws.com
    Description: RDS PostgreSQL private endpoint (within VPC)

  DBName:
    Type: String
    Default: postgres
    Description: Database name

  SecretArn:
    Type: String
    Description: >
      ARN of the Secrets Manager secret containing DB credentials.
      Secret must have keys: "username" and "password".

Resources:

  # -------------------------------------------------------
  # Security Group for Lambda
  # -------------------------------------------------------
  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "Security group for ${FunctionName} Lambda"
      VpcId: !ImportValue
        'Fn::Sub': '${FunctionName}-VpcId'
      SecurityGroupEgress:
        - Description: PostgreSQL to private RDS
          IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          DestinationSecurityGroupId: !ImportValue
            'Fn::Sub': '${FunctionName}-RDSSecurityGroupId'
        - Description: HTTPS for Secrets Manager VPC endpoint
          IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub "${FunctionName}-lambda-sg"

  # Allow inbound 443 on the VPC endpoint SG (self-referencing — Lambda → Secrets Manager endpoint)
  SecretsManagerEndpointIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref LambdaSecurityGroup
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      SourceSecurityGroupId: !Ref LambdaSecurityGroup
      Description: Allow HTTPS from Lambda to Secrets Manager VPC endpoint

  # Allow inbound 5432 from Lambda into RDS
  RDSIngressFromLambda:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !ImportValue
        'Fn::Sub': '${FunctionName}-RDSSecurityGroupId'
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !Ref LambdaSecurityGroup
      Description: Allow PostgreSQL from Lambda

  # -------------------------------------------------------
  # VPC Interface Endpoint for Secrets Manager
  # -------------------------------------------------------
  SecretsManagerVPCEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !ImportValue
        'Fn::Sub': '${FunctionName}-VpcId'
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.secretsmanager'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !ImportValue
          'Fn::Sub': '${FunctionName}-PrivateSubnet1Id'
        - !ImportValue
          'Fn::Sub': '${FunctionName}-PrivateSubnet2Id'
      SecurityGroupIds:
        - !Ref LambdaSecurityGroup
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action:
              - secretsmanager:GetSecretValue
            Resource: !Ref SecretArn

  # -------------------------------------------------------
  # IAM Role
  # -------------------------------------------------------
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${FunctionName}-execution-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole  # NEW
      Policies:
        - PolicyName: SecretsManagerAccess                                        # NEW
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref SecretArn

  # -------------------------------------------------------
  # Lambda Function
  # -------------------------------------------------------
  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref FunctionName
      PackageType: Image
      Code:
        ImageUri: !Ref ImageUri
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 512
      VpcConfig:                                        
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds:
          - !ImportValue
            'Fn::Sub': '${FunctionName}-PrivateSubnet1Id'
          - !ImportValue
            'Fn::Sub': '${FunctionName}-PrivateSubnet2Id'
      Environment:                                      
        Variables:
          DB_HOST: !Ref DBHost
          DB_PORT: "5432"
          DB_NAME: !Ref DBName
          SECRET_ARN: !Ref SecretArn
          APP_AWS_REGION: !Ref AWS::Region
          MANGUM_LIFESPAN: "off"

  # -------------------------------------------------------
  # API Gateway, Integration, Route, Stage, Permission
  # -------------------------------------------------------
  ApiGateway:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub "${FunctionName}-api"
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - "*"
        AllowHeaders:
          - "*"

  LambdaIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ApiGateway
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaFunction.Arn}/invocations"
      PayloadFormatVersion: "2.0"

  DefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: "$default"
      Target: !Sub "integrations/${LambdaIntegration}"

  ApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref ApiGateway
      StageName: "$default"
      AutoDeploy: true

  LambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LambdaFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*/*"

Outputs:
  ApiUrl:
    Description: "FastAPI base URL — append your route paths (e.g. /docs, /health)"
    Value: !GetAtt ApiGateway.ApiEndpoint

  LambdaFunctionArn:
    Description: Lambda Function ARN
    Value: !GetAtt LambdaFunction.Arn

  LambdaExecutionRoleArn:
    Description: IAM Role ARN
    Value: !GetAtt LambdaExecutionRole.Arn

  SecretsManagerEndpointId:
    Description: VPC Endpoint ID for Secrets Manager
    Value: !Ref SecretsManagerVPCEndpoint